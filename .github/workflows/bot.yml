
name: FB Auto Bot (Video to Release)

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 5 * * *' 

# GitHub ko "Release" banane ki permission dena zaroori hai
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Code download kar raha hai...
        uses: actions/checkout@v4

      - name: Python setup kar raha hai...
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' 

      - name: System Dependencies (Xvfb & FFmpeg) install kar raha hai...
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg
          pip install DrissionPage requests

      - name: Run Script & Record Video 🎥
        env:
          FB_COOKIES: ${{ secrets.FB_COOKIES }} 
          PYTHONUNBUFFERED: 1  # 👈 YEH LOGS KO REAL-TIME KAREGA
        run: |
          # 1. Virtual screen setup
          Xvfb :99 -screen 0 1920x1080x24 &
          export DISPLAY=:99
          
          # 2. FFmpeg recording start
          ffmpeg -y -video_size 1920x1080 -framerate 30 -f x11grab -i :99.0 -c:v libx264 -preset ultrafast -pix_fmt yuv420p output_video.mp4 > /dev/null 2>&1 &
          FFMPEG_PID=$!
          
          # 3. Apna DrissionPage wala code run karein (-u flag zaroori hai real-time logs ke liye)
          python -u main.py
          
          # 4. Script khatam hone k baad recording safely band karein
          sleep 3
          kill -INT $FFMPEG_PID
          sleep 2

      # ==========================================
      # 🚀 VIDEO KO GITHUB RELEASES MEIN UPLOAD KARNA
      # ==========================================
      - name: Upload Video to GitHub Releases
        if: always() # 👈 SCRIPT FAIL BHI HO TO VIDEO UPLOAD HOGI TAAYE ERROR DIKH SAKE
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
        run: |
          TAG_NAME="FB-Post-$(date +'%Y%m%d-%H%M%S')"
          
          echo "Uploading output_video.mp4 to GitHub Releases..."
          
          # Check if video was actually created
          if [ -f "output_video.mp4" ]; then
            gh release create "$TAG_NAME" output_video.mp4 \
              --title "Post Upload Saboot: $TAG_NAME" \
              --notes "Automated run ka video evidence."
            echo "✅ Video successfully Releases mein save ho gayi!"
          else
            echo "❌ Video file nahi mili, shayad ffmpeg properly start nahi hua."
          fi

          





